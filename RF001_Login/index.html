<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="pt-br">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="container">
        <div class="form-box active" id="login-form">
           <form action="">
  <h2>Login</h2>
  <input type="Email" name="Email" placeholder="Email" required>
  <input type="password" name="Senha" placeholder="Senha" required>
  <button type="submit" name="Login">Login</button>
  <p>Você não tem uma conta? <a href="#" onclick="showForm('registrar-form')">Registrar</a></p>
  
  <!-- ✅ adicione isso aqui -->
  <p id="mensagem-erro" style="display:none; color:red; text-align:center;">
    Email ou senha incorretos!
  </p>
            </form>
        </div>
    </div>

     <div class="container">
        <div class="form-box" id="registrar-form">
            <form action="">
                <h2>Registrar</h2>
                <input type="text" name="Name" placeholder="Nome" required>
                <input type="Email" name="Email" placeholder="Email" required>
                <input type="password" name="Senha" placeholder="Senha" required>
                <select name="role" required>
                    <option value="">Cliente ou Funcionário</option>
                    <option value="user">Cliente</option>
                    <option value="admin">Funcionário</option>

               </select>
                <button type="submit" name="registrar">Registrar</button>
                <p>Você já possui tem uma conta? <a href="#" onclick="showForm('login-form')">Login</a></p>
            </form>
        </div>
    </div>

     <script src="script.js"></script>

<div class="background">
  <img src="login.logo.png" class="logo l1">
  <img src="login.logo.png" class="logo l2">
  <img src="login.logo.png" class="logo l3">
</div>

</div>
</body>
</html>
