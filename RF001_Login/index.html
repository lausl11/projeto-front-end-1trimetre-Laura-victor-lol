<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="pt-br">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="container">
        <div class="form-box active" id="login-form">
            <form action="">
                <h2>Login</h2>
                <input type="email" name="email" placeholder="email" required>
                <input type="senha" name="senha" placeholder="senha" required>
                <button type="enviar" name="Login">Login</button>
                <p>Você não tem uma conta? <a href="#" onclick="showForm('registrar-form')">registrar</a></p>
                
               
            </form>
        </div>
    </div>

     <div class="container">
        <div class="form-box" id="registrar-form">
            <form action="">
                <h2>Registrar</h2>
                <input type="text" name="name" placeholder="Nome" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="senha" name="senha" placeholder="senha" required>
                <select name="role" required>
                    <option value="">Cliente ou Funcionário</option>
                    <option value="user">Cliente</option>
                    <option value="admin">Funcionário</option>

               </select>
                <button type="enviar" name="registrar">registrar</button>
                <p>Você já possui tem uma conta? <a href="#" onclick="showForm('login-form')">Login</a></p>
            </form>
        </div>
    </div>

    <nav class="navbar">
        <div class="logo" id="pginicial" img scr="">LAVANDERIA CEPERS</div>

        <div class="menu">
           <a href="#">Como Fuinciona</a>
           <a href="#"><img src="../Imagens/carrinho.png" alt="carrinho"></a>
           <a href="#" onclick="showForm('login-form')">Login</a>
        </div>
    </nav>
   
     <script src="script.js"></script>
</body>
</html>
